name: Build and Release Emulanders

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout 
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Update packages
      run: |
        sudo -n apt-get update
        sudo -n apt-get upgrade -y git build-essential zip

    - name: Prepare Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
        export PATH="$HOME/.cargo/bin:$PATH"
        rustup component add rust-src --toolchain nightly

    - name: Prepare cargo-nx
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        cargo install cargo-nx --git https://github.com/aarch64-switch-rs/cargo-nx

    - name: Checkout latest libnx commit
      run: |
        git clone --recurse-submodules https://github.com/switchbrew/libnx.git

    - name: Build and install libnx
      run: |
        cd libnx
        make install -j$(nproc)

    - name: Build Project
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        make dist -j$(nproc)

    - name: Package Output
      run: |
        cd SdOut
        zip -r ../emulanders-release.zip *

    - name: Upload CI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: emulanders-build
        path: emulanders-release.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: emulanders-release.zip
        generate_release_notes: true