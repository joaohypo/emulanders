name: Build and Release Emulanders

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    permissions:
      contents: write
      packages: read

    steps:
    - name: Checkout 
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Update packages
      run: |
        sudo -n apt-get update
        sudo -n apt-get upgrade -y git build-essential zip

    - name: Prepare Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
        export PATH="$HOME/.cargo/bin:$PATH"
        rustup show

    - name: Prepare cargo-nx
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        cargo install cargo-nx --git https://github.com/aarch64-switch-rs/cargo-nx

    - name: Checkout latest libnx commit
      run: |
        git clone --recurse-submodules https://github.com/switchbrew/libnx.git

    - name: Build and install libnx
      run: |
        cd libnx
        make install -j$(nproc)

    - name: Build Project
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        make dist -j$(nproc)

    - name: Set Release Name
      shell: bash
      run: |
        if [[ ${{ github.ref }} == refs/tags/* ]]; then
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "RELEASE_NAME=emulanders-${TAG_NAME}" >> $GITHUB_ENV
        else
          SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)
          echo "RELEASE_NAME=emulanders-${SHORT_SHA}" >> $GITHUB_ENV
        fi

    - name: Package Output
      shell: bash
      run: |
        cd SdOut
        zip -r ../${{ env.RELEASE_NAME }}.zip *

    - name: Upload CI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.RELEASE_NAME }}
        path: ${{ env.RELEASE_NAME }}.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.RELEASE_NAME }}.zip
        generate_release_notes: true